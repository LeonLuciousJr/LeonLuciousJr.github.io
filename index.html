<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Leon Lucious Jr. — CS & Math @ UA</title>
  <meta name="description" content="Leon Lucious Jr. — CS & Math student at The University of Alabama. LLM researcher, software engineer, and problem solver."/>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;1,9..40,300&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    /* ═══════════════════════════════════════════
       DESIGN TOKENS — edit these to restyle the whole site
    ═══════════════════════════════════════════ */
    :root {
      --bg:          #0d0f14;
      --bg2:         #12151d;
      --bg3:         #171b26;
      --bg4:         #1c2133;
      --border:      rgba(255,255,255,0.07);
      --border-act:  rgba(34,211,238,0.35);
      --cyan:        #22d3ee;
      --cyan-dim:    #0e9ab5;
      --cyan-glow:   rgba(34,211,238,0.18);
      --cyan-soft:   rgba(34,211,238,0.08);
      --indigo:      #818cf8;
      --white:       #f1f5f9;
      --muted:       #94a3b8;
      --faint:       #475569;
      --green:       #4ade80;
      --syne:        'Syne', sans-serif;
      --dm:          'DM Sans', sans-serif;
      --mono:        'JetBrains Mono', monospace;
      --radius:      4px;
      --nav-h:       68px;
    }

    /* ═══════════════════════════════════════════ BASE ═══ */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body { background: var(--bg); color: var(--white); font-family: var(--dm); overflow-x: hidden; cursor: none; }

    /* grain */
    body::after {
      content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 9000;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      opacity: 0.02;
    }

    /* ═══════════════════════════════════════════ UTILITIES ═══ */
    .label {
      font-family: var(--mono); font-size: 0.68rem; color: var(--cyan);
      letter-spacing: 0.22em; text-transform: uppercase;
      display: flex; align-items: center; gap: 10px; margin-bottom: 12px;
    }
    .label::before { content:''; width:20px; height:1.5px; background:var(--cyan); box-shadow:0 0 6px var(--cyan); flex-shrink:0; }
    .section-title { font-family:var(--syne); font-size:clamp(1.9rem,4vw,3rem); font-weight:800; color:var(--white); letter-spacing:-0.02em; line-height:1.1; margin-bottom:48px; }
    .section-divider { width:100%; height:1px; background:linear-gradient(90deg,transparent,var(--border),transparent); }

    /* Reveal on scroll */
    .reveal { opacity:0; transform:translateY(24px); transition:opacity .6s ease,transform .6s ease; }
    .reveal.visible { opacity:1; transform:translateY(0); }
    .d1{transition-delay:.08s} .d2{transition-delay:.16s} .d3{transition-delay:.24s} .d4{transition-delay:.32s} .d5{transition-delay:.40s}

    /* Buttons */
    .btn { font-family:var(--syne); font-size:0.8rem; font-weight:700; letter-spacing:0.06em; padding:12px 26px; text-decoration:none; display:inline-flex; align-items:center; gap:8px; cursor:none; transition:all .22s; }
    .btn-primary { background:var(--cyan); color:var(--bg); border:none; }
    .btn-primary:hover { background:#38e0f7; box-shadow:0 0 28px rgba(34,211,238,.45),0 8px 24px rgba(0,0,0,.4); transform:translateY(-2px); }
    .btn-outline { border:1.5px solid var(--border); background:transparent; color:var(--muted); }
    .btn-outline:hover { border-color:var(--cyan); color:var(--white); transform:translateY(-2px); box-shadow:0 0 18px rgba(34,211,238,.1); }

    /* Chip */
    .chip { font-family:var(--mono); font-size:0.65rem; padding:4px 11px; border:1px solid var(--border); background:var(--bg3); color:var(--faint); letter-spacing:.05em; transition:all .2s; }
    .chip:hover { border-color:var(--border-act); color:var(--cyan); background:var(--cyan-soft); transform:translateY(-2px); }

    /* ═══════════════════════════════════════════ PROGRESS BAR ═══ */
    #progress-bar { position:fixed; top:0; left:0; height:2px; background:linear-gradient(90deg,var(--cyan),var(--indigo)); z-index:10000; transition:width .1s linear; box-shadow:0 0 10px var(--cyan-glow); }

    /* ═══════════════════════════════════════════ CURSOR ═══ */
    #cur-dot { position:fixed; width:6px; height:6px; background:var(--cyan); border-radius:50%; pointer-events:none; z-index:9998; transform:translate(-50%,-50%); box-shadow:0 0 8px var(--cyan); transition:width .2s,height .2s; }
    #cur-ring { position:fixed; width:32px; height:32px; border:1.5px solid rgba(34,211,238,.5); border-radius:50%; pointer-events:none; z-index:9997; transform:translate(-50%,-50%); transition:width .25s,height .25s,border-color .2s; }
    body.cur-hover #cur-dot { width:10px; height:10px; }
    body.cur-hover #cur-ring { width:44px; height:44px; border-color:var(--cyan); }

    /* ═══════════════════════════════════════════ NAV ═══ */
    nav { position:fixed; top:0; left:0; right:0; z-index:1000; height:var(--nav-h); padding:0 6vw; display:flex; align-items:center; justify-content:space-between; background:rgba(13,15,20,.8); backdrop-filter:blur(20px); border-bottom:1px solid var(--border); }
    .nav-logo { font-family:var(--syne); font-weight:800; font-size:1rem; color:var(--white); letter-spacing:.01em; }
    .nav-logo span { color:var(--cyan); }
    .nav-links { display:flex; gap:32px; list-style:none; }
    .nav-links a { font-size:.8rem; font-weight:500; color:var(--muted); text-decoration:none; letter-spacing:.03em; transition:color .2s; position:relative; }
    .nav-links a::after { content:''; position:absolute; bottom:-4px; left:0; width:0; height:1.5px; background:var(--cyan); transition:width .25s; box-shadow:0 0 6px var(--cyan); }
    .nav-links a:hover,.nav-links a.active { color:var(--white); }
    .nav-links a:hover::after,.nav-links a.active::after { width:100%; }
    .nav-resume { font-family:var(--syne); font-size:.75rem; font-weight:700; letter-spacing:.08em; padding:7px 18px; border:1.5px solid var(--border); color:var(--muted); text-decoration:none; transition:all .22s; }
    .nav-resume:hover { border-color:var(--cyan); color:var(--white); }

    /* ═══════════════════════════════════════════ SECTIONS ═══ */
    section { position:relative; min-height:100vh; display:flex; flex-direction:column; justify-content:center; padding:calc(var(--nav-h) + 60px) 8vw 80px; }

    /* ═══════════════════════════════════════════ HERO ═══ */
    #hero { justify-content:center; overflow:hidden; }
    .hero-glow { position:absolute; top:5%; right:-5%; width:600px; height:600px; background:radial-gradient(ellipse,rgba(34,211,238,.05) 0%,transparent 68%); pointer-events:none; animation:bgPulse 7s ease-in-out infinite; }
    .hero-glow2 { position:absolute; bottom:10%; left:-10%; width:400px; height:400px; background:radial-gradient(ellipse,rgba(129,140,248,.04) 0%,transparent 68%); pointer-events:none; animation:bgPulse 9s ease-in-out infinite reverse; }
    @keyframes bgPulse { 0%,100%{transform:scale(1)} 50%{transform:scale(1.08)} }
    .hero-eyebrow { font-family:var(--mono); font-size:.72rem; color:var(--cyan); letter-spacing:.2em; text-transform:uppercase; margin-bottom:18px; display:flex; align-items:center; gap:12px; opacity:0; animation:fadeUp .7s .2s forwards; }
    .hero-eyebrow-line { width:28px; height:1px; background:var(--cyan); box-shadow:0 0 6px var(--cyan); }
    .hero-name { font-family:var(--syne); font-size:clamp(3.2rem,9vw,8rem); font-weight:800; line-height:1; letter-spacing:-.03em; margin-bottom:22px; background:linear-gradient(135deg,#f1f5f9 0%,#94a3b8 55%,#22d3ee 100%); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; opacity:0; animation:fadeUp .8s .35s forwards; }
    .hero-sub { font-size:clamp(1rem,2.2vw,1.2rem); font-weight:300; color:var(--muted); margin-bottom:40px; max-width:540px; line-height:1.75; opacity:0; animation:fadeUp .8s .5s forwards; }
    .hero-sub .accent { color:var(--white); font-weight:400; }
    /* Stats row */
    .hero-stats { display:flex; gap:36px; margin-bottom:44px; opacity:0; animation:fadeUp .8s .6s forwards; flex-wrap:wrap; }
    .hero-stat { display:flex; flex-direction:column; gap:3px; }
    .hero-stat-val { font-family:var(--syne); font-size:1.5rem; font-weight:800; color:var(--cyan); }
    .hero-stat-label { font-family:var(--mono); font-size:.62rem; color:var(--faint); letter-spacing:.12em; text-transform:uppercase; }
    .hero-btns { display:flex; gap:12px; flex-wrap:wrap; opacity:0; animation:fadeUp .8s .72s forwards; }
    @keyframes fadeUp { from{opacity:0;transform:translateY(18px)} to{opacity:1;transform:translateY(0)} }
    .scroll-hint { position:absolute; bottom:36px; left:8vw; display:flex; align-items:center; gap:12px; opacity:0; animation:fadeUp .8s 1.1s forwards; }
    .scroll-line { width:1px; height:44px; background:linear-gradient(to bottom,transparent,var(--cyan)); animation:sPulse 2s ease-in-out infinite; }
    @keyframes sPulse { 0%,100%{opacity:.35} 50%{opacity:1} }
    .scroll-text { font-family:var(--mono); font-size:.62rem; color:var(--faint); letter-spacing:.15em; writing-mode:vertical-rl; }

    /* ═══════════════════════════════════════════ ABOUT ═══ */
    #about { min-height:auto; padding-top:100px; padding-bottom:100px; }
    .about-grid { display:grid; grid-template-columns:1fr 2fr; gap:60px; align-items:start; }
    /* Photo */
    .photo-wrap { position:relative; }
    .photo-frame { width:100%; aspect-ratio:1; overflow:hidden; border:1px solid var(--border); position:relative; }
    .photo-frame img { width:100%; height:100%; object-fit:cover; object-position:center top; display:block; filter:grayscale(15%) contrast(1.05); transition:filter .4s; }
    .photo-frame:hover img { filter:grayscale(0%) contrast(1); }
    .photo-accent { position:absolute; bottom:-12px; right:-12px; width:100%; height:100%; border:1px solid rgba(34,211,238,.2); z-index:-1; }
    .photo-badge { position:absolute; bottom:14px; left:14px; background:rgba(13,15,20,.92); border:1px solid var(--border); backdrop-filter:blur(10px); padding:10px 14px; display:flex; align-items:center; gap:8px; }
    .photo-badge-dot { width:7px; height:7px; border-radius:50%; background:var(--green); box-shadow:0 0 8px rgba(74,222,128,.7); animation:bDot 2s ease-in-out infinite; }
    @keyframes bDot { 0%,100%{opacity:1} 50%{opacity:.25} }
    .photo-badge-text { font-family:var(--mono); font-size:.65rem; color:var(--muted); letter-spacing:.08em; }
    /* Bio */
    .about-bio { }
    .about-bio p { font-size:.92rem; line-height:1.85; color:var(--muted); margin-bottom:16px; }
    .about-bio p strong { color:var(--white); font-weight:500; }
    .about-bio p .hl { color:var(--cyan); }
    /* Currently card */
    .now-card { background:var(--bg2); border:1px solid var(--border); padding:20px 24px; margin-bottom:28px; display:flex; gap:16px; align-items:flex-start; position:relative; overflow:hidden; }
    .now-card::before { content:''; position:absolute; left:0; top:0; bottom:0; width:2px; background:var(--cyan); box-shadow:0 0 8px var(--cyan); }
    .now-tag { font-family:var(--mono); font-size:.6rem; color:var(--cyan); letter-spacing:.18em; text-transform:uppercase; margin-bottom:5px; }
    .now-text { font-size:.82rem; color:var(--muted); line-height:1.65; }
    .now-text strong { color:var(--white); font-weight:500; }
    /* Skills */
    .skills-section { margin-top:32px; }
    .skills-group { margin-bottom:18px; }
    .skills-group-label { font-family:var(--mono); font-size:.62rem; color:var(--cyan); letter-spacing:.18em; text-transform:uppercase; margin-bottom:8px; }
    .skills-chips { display:flex; flex-wrap:wrap; gap:6px; }

    /* ═══════════════════════════════════════════ RESEARCH / EXPERIENCE ═══ */
    #experience { min-height:auto; padding-top:80px; padding-bottom:80px; }
    .exp-card { background:var(--bg2); border:1px solid var(--border); padding:28px 32px; margin-bottom:18px; position:relative; overflow:hidden; transition:border-color .3s,box-shadow .3s; }
    .exp-card::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,var(--cyan),transparent); opacity:0; transition:opacity .35s; }
    .exp-card:hover { border-color:rgba(34,211,238,.18); box-shadow:0 8px 40px rgba(0,0,0,.25); }
    .exp-card:hover::before { opacity:1; }
    .exp-header { display:flex; justify-content:space-between; align-items:flex-start; gap:16px; margin-bottom:6px; flex-wrap:wrap; }
    .exp-role { font-family:var(--syne); font-size:1rem; font-weight:700; color:var(--white); }
    .exp-date { font-family:var(--mono); font-size:.68rem; color:var(--cyan); letter-spacing:.08em; flex-shrink:0; padding-top:2px; }
    .exp-org { font-size:.82rem; color:var(--cyan-dim); margin-bottom:14px; }
    .exp-bullets { list-style:none; display:flex; flex-direction:column; gap:7px; }
    .exp-bullets li { font-size:.82rem; color:var(--muted); line-height:1.72; padding-left:16px; position:relative; }
    .exp-bullets li::before { content:'–'; position:absolute; left:0; color:var(--faint); }
    /* Education inside experience */
    .edu-card { background:var(--bg3); border:1px solid var(--border); padding:22px 28px; margin-bottom:18px; display:flex; justify-content:space-between; align-items:flex-start; flex-wrap:wrap; gap:16px; transition:border-color .25s; }
    .edu-card:hover { border-color:rgba(34,211,238,.2); }
    .edu-school { font-family:var(--syne); font-size:.98rem; font-weight:700; color:var(--white); margin-bottom:4px; }
    .edu-degree { font-size:.82rem; color:var(--muted); margin-bottom:10px; }
    .edu-right { text-align:right; }
    .edu-date { font-family:var(--mono); font-size:.68rem; color:var(--cyan); letter-spacing:.06em; margin-bottom:6px; }
    .edu-tags { display:flex; flex-wrap:wrap; gap:5px; justify-content:flex-end; }
    /* Presentation */
    .pres-card { border:1px solid var(--border); background:var(--bg2); padding:20px 24px; display:flex; gap:18px; align-items:flex-start; margin-top:28px; transition:border-color .25s; }
    .pres-card:hover { border-color:rgba(34,211,238,.22); }
    .pres-badge { font-family:var(--mono); font-size:.6rem; color:var(--cyan); border:1px solid rgba(34,211,238,.3); padding:6px 10px; white-space:nowrap; flex-shrink:0; }
    .pres-title { font-family:var(--syne); font-size:.88rem; font-weight:700; color:var(--white); margin-bottom:4px; }
    .pres-venue { font-size:.78rem; color:var(--muted); }

    /* ═══════════════════════════════════════════ PROJECTS ═══ */
    #projects { min-height:auto; padding-top:80px; padding-bottom:80px; }
    .projects-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(300px,1fr)); gap:18px; }
    .proj-card { background:var(--bg2); border:1px solid var(--border); padding:28px; display:flex; flex-direction:column; position:relative; overflow:hidden; transition:border-color .3s,transform .3s,box-shadow .3s; }
    .proj-card::before { content:''; position:absolute; top:0; left:0; right:0; height:1px; background:linear-gradient(90deg,transparent,var(--cyan),transparent); opacity:0; transition:opacity .3s; }
    .proj-card:hover { border-color:rgba(34,211,238,.2); transform:translateY(-4px); box-shadow:0 18px 50px rgba(0,0,0,.35); }
    .proj-card:hover::before { opacity:1; }
    .proj-date { font-family:var(--mono); font-size:.62rem; color:var(--faint); letter-spacing:.1em; margin-bottom:8px; }
    .proj-title { font-family:var(--syne); font-size:1.05rem; font-weight:700; color:var(--white); margin-bottom:12px; }
    .proj-bullets { list-style:none; flex:1; margin-bottom:18px; display:flex; flex-direction:column; gap:6px; }
    .proj-bullets li { font-size:.8rem; color:var(--muted); line-height:1.7; padding-left:14px; position:relative; }
    .proj-bullets li::before { content:'–'; position:absolute; left:0; color:var(--faint); }
    .proj-stack { display:flex; flex-wrap:wrap; gap:5px; }
    .proj-stack .chip { font-size:.62rem; }

    /* ═══════════════════════════════════════════ CONTACT ═══ */
    #contact { min-height:auto; padding-top:80px; padding-bottom:80px; }
    .contact-grid { display:grid; grid-template-columns:1fr 1fr; gap:72px; align-items:start; }
    .contact-heading { font-family:var(--syne); font-size:clamp(2rem,4vw,3.2rem); font-weight:800; letter-spacing:-.02em; line-height:1.15; margin-bottom:18px; }
    .contact-heading span { color:var(--cyan); }
    .contact-sub { font-size:.88rem; line-height:1.8; color:var(--muted); margin-bottom:36px; }
    .contact-items { display:flex; flex-direction:column; gap:12px; }
    .contact-item { display:flex; align-items:center; gap:14px; text-decoration:none; padding:13px 16px; border:1px solid var(--border); background:var(--bg2); transition:all .22s; }
    .contact-item:hover { border-color:rgba(34,211,238,.3); transform:translateX(4px); box-shadow:-3px 0 0 0 var(--cyan); }
    .contact-icon { width:34px; height:34px; display:flex; align-items:center; justify-content:center; background:var(--bg3); border:1px solid var(--border); color:var(--cyan); font-family:var(--mono); font-size:.75rem; font-weight:500; flex-shrink:0; }
    .contact-label { font-family:var(--mono); font-size:.6rem; color:var(--faint); letter-spacing:.1em; text-transform:uppercase; margin-bottom:2px; }
    .contact-val { font-size:.82rem; color:var(--white); }
    /* Form */
    .contact-form { display:flex; flex-direction:column; gap:12px; }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .fg { display:flex; flex-direction:column; gap:5px; }
    .fl { font-family:var(--mono); font-size:.62rem; color:var(--faint); letter-spacing:.12em; text-transform:uppercase; }
    .fi,.ft { background:var(--bg2); border:1px solid var(--border); color:var(--white); font-family:var(--dm); font-size:.85rem; padding:11px 15px; outline:none; width:100%; transition:border-color .2s,box-shadow .2s; resize:none; }
    .fi::placeholder,.ft::placeholder { color:var(--faint); }
    .fi:focus,.ft:focus { border-color:rgba(34,211,238,.4); box-shadow:0 0 0 3px rgba(34,211,238,.07); }
    .ft { min-height:110px; }

    /* ═══════════════════════════════════════════ FOOTER ═══ */
    footer { border-top:1px solid var(--border); padding:26px 8vw; display:flex; align-items:center; justify-content:space-between; flex-wrap:wrap; gap:12px; }
    .footer-logo { font-family:var(--syne); font-size:.85rem; font-weight:700; color:var(--white); }
    .footer-logo span { color:var(--cyan); }
    .footer-links { display:flex; gap:20px; }
    .footer-links a { font-family:var(--mono); font-size:.68rem; color:var(--faint); text-decoration:none; letter-spacing:.06em; transition:color .2s; }
    .footer-links a:hover { color:var(--cyan); }
    .footer-copy { font-family:var(--mono); font-size:.65rem; color:var(--faint); letter-spacing:.04em; width:100%; padding-top:8px; border-top:1px solid var(--border); }

    /* ═══════════════════════════════════════════ SCROLLBAR ═══ */
    ::-webkit-scrollbar { width:5px; }
    ::-webkit-scrollbar-track { background:var(--bg); }
    ::-webkit-scrollbar-thumb { background:rgba(34,211,238,.25); border-radius:3px; }
    ::-webkit-scrollbar-thumb:hover { background:var(--cyan); }

    /* ═══════════════════════════════════════════ MOBILE ═══ */
    @media (max-width:860px) {
      section { padding:calc(var(--nav-h) + 40px) 5vw 60px; }
      nav { padding:0 5vw; }
      .nav-links { gap:18px; }
      .nav-links a { font-size:.75rem; }
      .about-grid { grid-template-columns:1fr; gap:36px; }
      .photo-frame { max-width:260px; }
      .contact-grid { grid-template-columns:1fr; gap:44px; }
      .form-row { grid-template-columns:1fr; }
      .hero-glow,.hero-glow2 { display:none; }
      .edu-card { flex-direction:column; }
      .edu-right { text-align:left; }
      .edu-tags { justify-content:flex-start; }
    }
  </style>
</head>
<body>
<div id="progress-bar" style="width:0%"></div>
<div id="cur-dot"></div>
<div id="cur-ring"></div>
<div id="root"></div>

<script type="text/babel">
const { useState, useEffect, useRef } = React;

/* ─────────────────────────────── HOOKS ─── */
function useReveal() {
  useEffect(() => {
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => { if (e.isIntersecting) { e.target.classList.add('visible'); obs.unobserve(e.target); }});
    }, { threshold: 0.1 });
    document.querySelectorAll('.reveal').forEach(el => obs.observe(el));
    return () => obs.disconnect();
  }, []);
}

function useActiveNav() {
  useEffect(() => {
    const ids = ['hero','about','experience','projects','contact'];
    const obs = new IntersectionObserver(entries => {
      entries.forEach(e => {
        const a = document.querySelector(`.nav-links a[href="#${e.target.id}"]`);
        if (!a) return;
        e.isIntersecting ? a.classList.add('active') : a.classList.remove('active');
      });
    }, { threshold: 0.35 });
    ids.forEach(id => { const el = document.getElementById(id); if(el) obs.observe(el); });
    return () => obs.disconnect();
  }, []);
}

function useCursor() {
  useEffect(() => {
    const dot = document.getElementById('cur-dot');
    const ring = document.getElementById('cur-ring');
    let mx=0,my=0,rx=0,ry=0;
    const onMove = e => { mx=e.clientX; my=e.clientY; };
    document.addEventListener('mousemove', onMove);
    let raf;
    (function loop(){
      rx+=(mx-rx)*.13; ry+=(my-ry)*.13;
      dot.style.left=mx+'px'; dot.style.top=my+'px';
      ring.style.left=rx+'px'; ring.style.top=ry+'px';
      raf=requestAnimationFrame(loop);
    })();
    const on=()=>document.body.classList.add('cur-hover');
    const off=()=>document.body.classList.remove('cur-hover');
    document.querySelectorAll('a,button,.proj-card,.exp-card,.contact-item,.chip').forEach(el=>{
      el.addEventListener('mouseenter',on); el.addEventListener('mouseleave',off);
    });
    return ()=>{ cancelAnimationFrame(raf); document.removeEventListener('mousemove',onMove); };
  }, []);
}

function useProgress() {
  useEffect(() => {
    const bar = document.getElementById('progress-bar');
    const update = () => {
      const pct = window.scrollY / (document.body.scrollHeight - window.innerHeight) * 100;
      bar.style.width = pct + '%';
    };
    window.addEventListener('scroll', update);
    return () => window.removeEventListener('scroll', update);
  }, []);
}

function Nav() {
  const links = ['about','experience','projects','contact'];
  return (
    <nav>
      <div className="nav-logo">Leon<span>.</span></div>
      <ul className="nav-links">
        {links.map(l=><li key={l}><a href={`#${l}`}>{l}</a></li>)}
      </ul>
      <a href={`mailto:${DATA.email}`} className="nav-resume btn">Hire Me →</a>
    </nav>
  );
}

function Hero() {
  return (
    <section id="hero">
      <div className="hero-glow"/><div className="hero-glow2"/>
      <div className="hero-eyebrow"><span className="hero-eyebrow-line"/>Open to internships &amp; research opportunities</div>
      <h1 className="hero-name">Leon<br/>Lucious Jr.</h1>
      <p className="hero-sub"><span className="accent">CS &amp; Math student</span> at The University of Alabama — {DATA.tagline}</p>
      <div className="hero-stats">
        {DATA.stats.map(s=>(
          <div key={s.label} className="hero-stat">
            <span className="hero-stat-val">{s.val}</span>
            <span className="hero-stat-label">{s.label}</span>
          </div>
        ))}
      </div>
      <div className="hero-btns">
        <a href="#projects" className="btn btn-primary">View My Work →</a>
        <a href="#contact" className="btn btn-outline">Get In Touch</a>
        <a href="#experience" className="btn btn-outline">Research</a>
      </div>
      <div className="scroll-hint"><div className="scroll-line"/><span className="scroll-text">scroll</span></div>
    </section>
  );
}

function About() {
  return (
    <section id="about">
      <div className="about-grid">
        {/* Photo column */}
        <div className="photo-wrap reveal">
          <div className="photo-frame">
            <img src={`data:image/jpeg;base64,${PHOTO_B64}`} alt="Leon Lucious Jr."/>
            <div className="photo-badge">
              <span className="photo-badge-dot"/>
              <span className="photo-badge-text">Open to opportunities</span>
            </div>
          </div>
          <div className="photo-accent"/>
        </div>
        {/* Bio column */}
        <div>
          <div className="label reveal">about me</div>
          {/* Currently card */}
          <div className="now-card reveal d1">
            <div>
              <div className="now-tag">{DATA.now.tag}</div>
              <div className="now-text" dangerouslySetInnerHTML={{__html: DATA.now.text}}/>
            </div>
          </div>
          <div className="about-bio">
            <p className="reveal d1">Hey, I'm <strong>Leon</strong> — a <span className="hl">Computer Science and Mathematics</span> double major at The University of Alabama, graduating May 2027. I thrive at the crossroads of rigorous mathematical thinking and creative software engineering.</p>
            <p className="reveal d2">My current focus is <strong>LLM research</strong> — evaluating how different prompting strategies affect model reliability, and building hybrid AI architectures for real-world applications in healthcare and auditing.</p>
            <p className="reveal d3">Outside the lab, I build projects that push my limits — from <strong>LLM-powered cybersecurity tools</strong> to cloud-deployed applications. I believe in learning by building and growing by doing.</p>
          </div>
          <div className="skills-section reveal d3">
            {DATA.skills.map(g=>(
              <div key={g.label} className="skills-group">
                <div className="skills-group-label">{g.label}</div>
                <div className="skills-chips">{g.items.map(s=><span key={s} className="chip">{s}</span>)}</div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </section>
  );
}

function Experience() {
  const d = DATA;
  return (
    <section id="experience">
      <div className="label reveal">experience &amp; education</div>
      <h2 className="section-title reveal">Research &amp; Academic Path</h2>

      {/* Education */}
      <div className="edu-card reveal d1">
        <div>
          <div className="edu-school">{d.education.school}</div>
          <div className="edu-degree">{d.education.degree}</div>
          <div style={{fontSize:'.78rem',color:'var(--faint)',fontFamily:'var(--mono)'}}>{d.education.location}</div>
        </div>
        <div className="edu-right">
          <div className="edu-date">{d.education.date}</div>
          <div className="edu-tags">{d.education.tags.map(t=><span key={t} className="chip" style={{fontSize:'.62rem'}}>{t}</span>)}</div>
        </div>
      </div>

      {/* Research experience */}
      {d.experience.map((exp,i)=>(
        <div key={i} className={`exp-card reveal d${i+2}`}>
          <div className="exp-header">
            <div>
              <div className="exp-role">{exp.role}</div>
              <div className="exp-org">{exp.org}</div>
            </div>
            <div className="exp-date">{exp.date}</div>
          </div>
          <ul className="exp-bullets">{exp.bullets.map((b,j)=><li key={j}>{b}</li>)}</ul>
        </div>
      ))}

      {/* Presentation */}
      <div className="reveal d4">
        <div className="label" style={{marginBottom:'12px',marginTop:'8px'}}>Presentations</div>
        <div className="pres-card">
          <div className="pres-badge">{d.presentation.type}</div>
          <div>
            <div className="pres-title">{d.presentation.title}</div>
            <div className="pres-venue">{d.presentation.venue}</div>
          </div>
        </div>
      </div>
    </section>
  );
}

function Projects() {
  return (
    <section id="projects">
      <div className="label reveal">projects</div>
      <h2 className="section-title reveal">What I've Built</h2>
      <div className="projects-grid">
        {DATA.projects.map((p,i)=>(
          <div key={i} className={`proj-card reveal d${(i%4)+1}`}>
            <div className="proj-date">{p.date}</div>
            <div className="proj-title">{p.title}</div>
            <ul className="proj-bullets">{p.bullets.map((b,j)=><li key={j}>{b}</li>)}</ul>
            <div className="proj-stack">{p.stack.map(s=><span key={s} className="chip proj-stack">{s}</span>)}</div>
          </div>
        ))}
      </div>
    </section>
  );
}

function Contact() {
  const [form,setForm]=useState({name:'',email:'',msg:''});
  const [sent,setSent]=useState(false);
  const items=[
    {icon:'✉',label:'Email',val:DATA.email,href:`mailto:${DATA.email}`},
    {icon:'GH',label:'GitHub',val:`github.com/${DATA.github}`,href:`https://github.com/${DATA.github}`},
    {icon:'in',label:'LinkedIn',val:`linkedin.com/in/${DATA.linkedin}`,href:`https://linkedin.com/in/${DATA.linkedin}`},
  ];
  return (
    <section id="contact">
      <div className="contact-grid">
        <div>
          <div className="label reveal">contact</div>
          <h2 className="contact-heading reveal">Let's <span>connect</span><br/>and build.</h2>
          <p className="contact-sub reveal d1">Have a research opportunity, project idea, or just want to talk AI and math? I'd love to hear from you.</p>
          <div className="contact-items">
            {items.map((c,i)=>(
              <a key={i} href={c.href} target="_blank" className={`contact-item reveal d${i+1}`}>
                <div className="contact-icon">{c.icon}</div>
                <div><div className="contact-label">{c.label}</div><div className="contact-val">{c.val}</div></div>
              </a>
            ))}
          </div>
        </div>
        <div className="reveal d2">
          {sent ? (
            <div style={{background:'var(--bg2)',border:'1px solid rgba(34,211,238,.18)',padding:'48px 32px',textAlign:'center'}}>
              <div style={{fontSize:'2.2rem',marginBottom:'12px',color:'var(--cyan)'}}>✓</div>
              <div style={{fontFamily:'var(--syne)',fontSize:'1rem',fontWeight:'700',marginBottom:'8px'}}>Message Sent!</div>
              <div style={{fontSize:'.82rem',color:'var(--muted)'}}>I'll get back to you soon.</div>
            </div>
          ):(
            <div className="contact-form">
              <div className="form-row">
                <div className="fg"><label className="fl">Name</label><input className="fi" placeholder="Your name" value={form.name} onChange={e=>setForm({...form,name:e.target.value})}/></div>
                <div className="fg"><label className="fl">Email</label><input className="fi" placeholder="your@email.com" value={form.email} onChange={e=>setForm({...form,email:e.target.value})}/></div>
              </div>
              <div className="fg"><label className="fl">Message</label><textarea className="ft" placeholder="What's on your mind?" value={form.msg} onChange={e=>setForm({...form,msg:e.target.value})}/></div>
              <button className="btn btn-primary" style={{width:'fit-content'}} onClick={()=>{if(form.name&&form.email&&form.msg)setSent(true)}}>Send Message →</button>
            </div>
          )}
        </div>
      </div>
    </section>
  );
}

function Footer() {
  const links=[
    {label:'GitHub',href:`https://github.com/${DATA.github}`},
    {label:'LinkedIn',href:`https://linkedin.com/in/${DATA.linkedin}`},
    {label:'Email',href:`mailto:${DATA.email}`},
  ];
  return (
    <footer>
      <div className="footer-logo">Leon<span>.</span></div>
      <div className="footer-links">{links.map(l=><a key={l.label} href={l.href} target="_blank">{l.label}</a>)}</div>
      <div className="footer-copy">© 2025 Leon Lucious Jr. · CS &amp; Mathematics · The University of Alabama · Graduating {DATA.gradYear}</div>
    </footer>
  );
}

/* ─────────────────────────────── APP ─── */
function App() {
  useReveal(); useActiveNav(); useCursor(); useProgress();
  return (
    <>
      <Nav/>
      <Hero/>
      <div className="section-divider"/>
      <About/>
      <div className="section-divider"/>
      <Experience/>
      <div className="section-divider"/>
      <Projects/>
      <div className="section-divider"/>
      <Contact/>
      <Footer/>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
